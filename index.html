<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Web Dev Projects</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>🚀 My Web Development Projects</h1>

  <div class="projects">

    <div class="card">
      <h2>Inline Block</h2>
      <a href="./Inline-block/">View Project</a>
    </div>

    <div class="card">
      <h2>Learning Roadmap</h2>
      <a href="./LEARNING_ROADMAP/">View Project</a>
    </div>

    <div class="card">
      <h2>Hero Section</h2>
      <a href="./hero_section/">View Project</a>
    </div>

    <div class="card">
      <h2>Pricing Plan</h2>
      <a href="./pricing_plan/">View Project</a>
    </div>

    <div class="card">
      <h2>Silver Gallery</h2>
      <a href="./silver-gallery/">View Project</a>
    </div>

  </div>

</body>
</html>
